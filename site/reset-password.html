<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redefinir senha | NearMe</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">NearMe</p>
        <h1>Redefina sua senha</h1>
        <p>Escolha uma nova senha para voltar ao app com acesso normal.</p>
      </section>

      <section class="card stack">
        <div id="status" class="status">Preencha os campos abaixo.</div>

        <form id="reset-form" class="stack">
          <div class="field">
            <label for="password">Nova senha</label>
            <input id="password" type="password" minlength="6" required />
          </div>

          <div class="field">
            <label for="confirm-password">Confirmar nova senha</label>
            <input id="confirm-password" type="password" minlength="6" required />
          </div>

          <div class="button-row">
            <button id="submit-button" type="submit">Salvar nova senha</button>
          </div>
        </form>
      </section>
    </main>
    <script src="./config.js"></script>
    <script src="./reset-password.js"></script>
  </body>
</html>
